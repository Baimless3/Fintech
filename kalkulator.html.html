<!DOCTYPE html><html lang="pl"><head><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="style.css"></head>
<body class="max-w-lg mx-auto p-8">
    <div class="premium-card p-8">
        <h2 class="text-2xl mb-4">Kalkulator Kredytowy</h2>
        <input id="kwota" type="number" placeholder="Kwota (PLN)" class="w-full p-3 border rounded mb-4">
        <button onclick="oblicz()" class="w-full btn-affiliate">Oblicz ratę</button>
        <div id="wynik" class="mt-6 text-xl font-bold text-blue-900"></div>
    </div>
    <script>function oblicz(){const k=document.getElementById('kwota').value; document.getElementById('wynik').innerText="Szacowana rata: "+(k*0.02).toFixed(2)+" PLN";}</script>
</body></html>
