<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Zestawienie Banków 2026</title>
</head>
<body class="bg-slate-950 text-white font-sans">

    <main class="max-w-6xl mx-auto py-20 px-6">
        <h1 class="text-4xl font-bold mb-16 text-center">Zestawienie <span class="text-blue-500">Banków</span></h1>
        
        <div id="ranking-container" class="space-y-16">
            </div>
    </main>

    <script>
        async function init() {
            const res = await fetch('data.json');
            const data = await res.json();
            
            // Grupowanie danych
            const groups = data.reduce((acc, item) => {
                (acc[item.grupa] = acc[item.grupa] || []).push(item);
                return acc;
            }, {});

            const container = document.getElementById('ranking-container');
            
            Object.keys(groups).forEach(groupName => {
                const section = document.createElement('section');
                section.innerHTML = `
                    <h2 class="text-xl font-bold text-blue-500 mb-6 border-l-4 border-blue-500 pl-4 uppercase tracking-widest">${groupName}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${groups[groupName].map(item => `
                            <div class="bg-slate-900 p-4 rounded-xl flex items-center justify-between border border-slate-800 hover:border-blue-500 transition">
                                <div class="flex items-center gap-4">
                                    <img src="${item.logo}" alt="${item.bank}" class="w-10 h-10 object-contain bg-white rounded-md p-1">
                                    <span class="font-semibold text-sm">${item.bank}</span>
                                </div>
                                <a href="${item.link}" class="text-blue-400 font-bold text-xs hover:text-white">INFO →</a>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }
        init();
    </script>
</body>
</html>
