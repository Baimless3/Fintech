<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ranking Banków 2026</title>
</head>
<body class="bg-slate-950 text-white">

    <main class="max-w-6xl mx-auto py-24 px-6">
        <h1 class="text-5xl font-bold mb-16 text-center">Zestawienie <span class="text-blue-500">Banków</span></h1>
        
        <div id="ranking-container" class="space-y-16">
            </div>
    </main>

    <script>
        async function initRanking() {
            const res = await fetch('data.json');
            const data = await res.json();
            
            const grouped = data.reduce((acc, bank) => {
                (acc[bank.grupa] = acc[bank.grupa] || []).push(bank);
                return acc;
            }, {});

            const container = document.getElementById('ranking-container');
            
            Object.keys(grouped).forEach(grupa => {
                const section = document.createElement('section');
                section.innerHTML = `
                    <h2 class="text-2xl font-bold text-blue-500 mb-6 border-l-4 border-blue-500 pl-4 uppercase tracking-wider">${grupa}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${grouped[grupa].map(item => `
                            <div class="bg-slate-900 p-4 rounded-xl flex items-center justify-between border border-slate-800 hover:border-blue-500 transition">
                                <div class="flex items-center gap-4">
                                    <img src="${item.logo}" alt="${item.bank}" class="w-10 h-10 object-contain bg-white rounded-md p-1">
                                    <span class="font-semibold">${item.bank}</span>
                                </div>
                                <a href="${item.link}" class="text-blue-400 font-bold text-xs hover:text-white">INFO →</a>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }
        initRanking();
    </script>
</body>
</html>
