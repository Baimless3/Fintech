<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Ranking Kredytów 2026</title>
</head>
<body class="bg-slate-950 text-white">

    <main class="max-w-5xl mx-auto py-24 px-6">
        <h1 class="text-5xl font-serif mb-12 text-center">Ranking <span class="text-blue-500">Kredytów 2026</span></h1>

        <div class="flex gap-4 justify-center mb-10">
            <button id="btn-asc" onclick="sortRanking('asc', this)" class="px-6 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600 transition">
                Najniższe RRSO ↑
            </button>
            <button id="btn-desc" onclick="sortRanking('desc', this)" class="px-6 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600 transition">
                Najwyższe RRSO ↓
            </button>
        </div>

        <div class="card overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-800 text-sm uppercase">
                        <th class="py-6 px-8">Bank</th>
                        <th class="py-6 px-8">RRSO</th>
                        <th class="py-6 px-8">Prowizja</th>
                        <th class="py-6 px-8">Akcja</th>
                    </tr>
                </thead>
                <tbody id="ranking-body" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </main>

    <script>
        let rankingData = [];

        async function loadRanking() {
            try {
                const response = await fetch('data.json');
                rankingData = await response.json();
                renderTable(rankingData);
            } catch (e) {
                console.error("Błąd ładowania danych:", e);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = data.map(item => `
                <tr class="hover:bg-blue-950/20 transition">
                    <td class="py-6 px-8 flex items-center gap-6">
                        <img src="${item.logo}" alt="${item.bank}" class="w-12 h-12 object-contain bg-white rounded-lg p-1">
                        <span class="font-bold text-xl">${item.bank}</span>
                    </td>
                    <td class="py-8 px-8 text-blue-400 font-bold text-lg">${item.rrso}%</td>
                    <td class="py-8 px-8">${item.prowizja}</td>
                    <td class="py-8 px-8"><a href="${item.link}" class="btn-affiliate">Wybierz</a></td>
                </tr>
            `).join('');
        }

        function sortRanking(order, btnElement) {
            // Sortowanie danych
            const sortedData = [...rankingData].sort((a, b) => {
                const rrsoA = parseFloat(a.rrso);
                const rrsoB = parseFloat(b.rrso);
                return order === 'asc' ? rrsoA - rrsoB : rrsoB - rrsoA;
            });
            renderTable(sortedData);

            // Zmiana kolorów przycisków
            document.getElementById('btn-asc').className = "px-6 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600 transition";
            document.getElementById('btn-desc').className = "px-6 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600 transition";
            
            // Podświetlenie klikniętego przycisku
            btnElement.className = "px-6 py-2 bg-blue-600 rounded-lg font-bold hover:bg-blue-700 transition";
        }

        loadRanking();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
