<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>Ranking Kredytów 2026</title>
</head>
<body class="bg-slate-950 text-white">

    <main class="max-w-5xl mx-auto py-24 px-6">
        <h1 class="text-5xl font-serif mb-12 text-center">Ranking <span class="text-blue-500">Kredytów 2026</span></h1>

        <div class="card overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-800 text-sm uppercase">
                        <th class="py-6 px-8">Bank</th>
                        <th class="py-6 px-8">RRSO</th>
                        <th class="py-6 px-8">Prowizja</th>
                        <th class="py-6 px-8">Akcja</th>
                    </tr>
                </thead>
                <tbody id="ranking-body" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadRanking() {
            const response = await fetch('data.json');
            const data = await response.json();
            const tbody = document.getElementById('ranking-body');
            
            tbody.innerHTML = data.map(item => `
                <tr class="hover:bg-blue-950/20 transition">
                    <td class="py-6 px-8 flex items-center gap-4">
                        <img src="${item.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" alt="${item.bank}" class="w-10 h-10 rounded-full bg-white p-1 object-contain">
                        <div class="w-10 h-10 rounded-full bg-blue-600 hidden items-center justify-center font-bold text-lg">${item.bank[0]}</div>
                        <span class="font-bold text-xl">${item.bank}</span>
                    </td>
                    <td class="py-8 px-8 text-blue-400 font-bold text-lg">${item.rrso}%</td>
                    <td class="py-8 px-8">${item.prowizja}</td>
                    <td class="py-8 px-8"><a href="${item.link}" class="btn-affiliate">Wybierz</a></td>
                </tr>
            `).join('');
        }
        loadRanking();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
