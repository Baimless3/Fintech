<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ranking Kredytów 2026</title>
</head>
<body class="bg-slate-950 text-white">

    <main class="max-w-5xl mx-auto py-24 px-6">
        <h1 class="text-5xl font-bold mb-12 text-center">Ranking <span class="text-blue-500">Kredytów 2026</span></h1>

        <div class="flex flex-wrap gap-2 justify-center mb-8">
            <button onclick="filterRanking('wszystkie', this)" class="filter-btn px-4 py-2 bg-blue-600 rounded-lg font-bold">Wszystkie</button>
            <button onclick="filterRanking('uniwersalne', this)" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600">Uniwersalne</button>
            <button onclick="filterRanking('cyfrowe', this)" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600">Cyfrowe</button>
            <button onclick="filterRanking('hipoteczne', this)" class="filter-btn px-4 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600">Hipoteczne</button>
        </div>

        <div class="flex gap-4 justify-center mb-10">
            <button id="btn-asc" onclick="sortRanking('asc', this)" class="sort-btn px-6 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600">Najniższe RRSO ↑</button>
            <button id="btn-desc" onclick="sortRanking('desc', this)" class="sort-btn px-6 py-2 bg-slate-700 rounded-lg font-bold hover:bg-slate-600">Najwyższe RRSO ↓</button>
        </div>

        <div class="bg-slate-900 rounded-xl overflow-hidden">
            <table class="w-full text-left">
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        let rankingData = [];
        let currentData = [];

        async function loadRanking() {
            const res = await fetch('data.json');
            rankingData = await res.json();
            currentData = rankingData;
            renderTable(currentData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('ranking-body');
            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-slate-800 hover:bg-blue-950/20">
                    <td class="py-6 px-8 flex items-center gap-6">
                        <img src="${item.logo}" class="w-12 h-12 bg-white rounded-lg p-1 object-contain">
                        <span class="font-bold text-xl">${item.bank}</span>
                    </td>
                    <td class="py-6 px-8 text-blue-400 font-bold">${item.rrso}%</td>
                    <td class="py-6 px-8">${item.prowizja}</td>
                    <td class="py-6 px-8"><a href="${item.link}" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">Wybierz</a></td>
                </tr>
            `).join('');
        }

        function filterRanking(kat, btn) {
            currentData = kat === 'wszystkie' ? rankingData : rankingData.filter(i => i.kategoria === kat);
            renderTable(currentData);
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-slate-700'));
            btn.classList.replace('bg-slate-700', 'bg-blue-600');
        }

        function sortRanking(order, btn) {
            currentData = [...currentData].sort((a, b) => order === 'asc' ? parseFloat(a.rrso) - parseFloat(b.rrso) : parseFloat(b.rrso) - parseFloat(a.rrso));
            renderTable(currentData);
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-slate-700'));
            btn.classList.replace('bg-slate-700', 'bg-blue-600');
        }

        loadRanking();
    </script>
</body>
</html>
