<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Kalkulatory Finansowe</title>
</head>
<body class="bg-slate-950 text-white font-sans py-12">
    <main class="max-w-4xl mx-auto px-6 grid md:grid-cols-2 gap-8">
        
        <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold mb-6 text-blue-500">Kalkulator Kredytowy</h2>
            <div class="space-y-4">
                <input type="number" id="k-kwota" placeholder="Kwota (PLN)" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <input type="number" id="k-lata" placeholder="Lata" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <input type="number" id="k-rrso" placeholder="RRSO (%)" step="0.1" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <button onclick="obliczKredyt()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">Oblicz ratę</button>
                <div id="k-wynik" class="text-center font-bold text-lg pt-4">Rata: 0 PLN</div>
            </div>
        </div>

        <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-bold mb-6 text-green-500">Kalkulator Lokat</h2>
            <div class="space-y-4">
                <input type="number" id="l-kwota" placeholder="Kapitał (PLN)" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <input type="number" id="l-opro" placeholder="Oprocentowanie (%)" step="0.1" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <input type="number" id="l-mies" placeholder="Liczba miesięcy" class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700">
                <button onclick="obliczLokatę()" class="w-full bg-green-600 py-3 rounded-lg font-bold hover:bg-green-500 transition">Oblicz zysk</button>
                <div id="l-wynik" class="text-center font-bold text-lg pt-4">Zysk: 0 PLN</div>
            </div>
        </div>
    </main>

    <script>
        // Kredyt
        function obliczKredyt() {
            const P = parseFloat(document.getElementById('k-kwota').value);
            const n = parseFloat(document.getElementById('k-lata').value) * 12;
            const r = (parseFloat(document.getElementById('k-rrso').value) / 100) / 12;
            const rata = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            document.getElementById('k-wynik').innerText = `Rata: ${rata.toFixed(2)} PLN`;
        }

        // Lokata (uproszczony wzór: Kapitał * oprocentowanie * czas w latach)
        function obliczLokatę() {
            const P = parseFloat(document.getElementById('l-kwota').value);
            const r = parseFloat(document.getElementById('l-opro').value) / 100;
            const m = parseFloat(document.getElementById('l-mies').value) / 12;
            const zysk = P * r * m;
            document.getElementById('l-wynik').innerText = `Zysk: ${zysk.toFixed(2)} PLN`;
        }
    </script>
</body>
