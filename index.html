<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <title>FinTech Hub | Premium</title>
</head>
<body class="bg-slate-950 text-white">

    <section class="py-32 text-center px-6">
        <h1 class="text-6xl font-bold mb-6">Finanse w klasie <span class="text-blue-500">Premium</span></h1>
        <p class="text-xl text-slate-400 mb-12">Najlepsze oferty finansowe w jednym miejscu.</p>
        <a href="ranking.html" class="btn-affiliate">Sprawdź Rankingi</a>
    </section>

    <section class="max-w-4xl mx-auto py-20 px-6 grid md:grid-cols-2 gap-8">
        <div>
            <h3 class="text-xl font-bold text-blue-500 mb-6">Edukacja Kredytowa</h3>
            <div id="kredyty-list"></div>
        </div>
        <div>
            <h3 class="text-xl font-bold text-blue-500 mb-6">Księgowość i KSeF</h3>
            <div id="ksiegowosc-list"></div>
        </div>
    </section>

    <script>
        async function loadZasoby() {
            try {
                const response = await fetch('zasoby.json');
                const data = await response.json();
                
                const render = (id, items) => {
                    document.getElementById(id).innerHTML = items.map(item => `
                        <a href="${item.url}" target="_blank" class="card p-6 block hover:bg-blue-950/20 transition mb-4">
                            <span class="font-bold">${item.tytul}</span>
                            <span class="block text-blue-400 text-sm mt-2">Czytaj artykuł →</span>
                        </a>
                    `).join('');
                };

                render('kredyty-list', data.kredyty);
                render('ksiegowosc-list', data.ksiegowosc);
            } catch (e) { console.error("Błąd ładowania zasobów:", e); }
        }
        loadZasoby();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
