<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ranking Kredytów 2026</title>
    <style>
        .btn-active { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans py-10">

    <main class="max-w-6xl mx-auto px-6">
        <h1 class="text-4xl font-bold mb-10 text-center">Ranking <span class="text-blue-500">Kredytów 2026</span></h1>
        
        <div class="flex justify-center gap-4 mb-12">
            <button id="sort-low" onclick="sortData('low')" class="bg-slate-800 px-6 py-2 rounded-full font-bold hover:bg-slate-700 transition">Najniższe RRSO ↑</button>
            <button id="sort-high" onclick="sortData('high')" class="bg-slate-800 px-6 py-2 rounded-full font-bold hover:bg-slate-700 transition">Najwyższe RRSO ↓</button>
        </div>

        <div id="ranking-container" class="space-y-16"></div>
    </main>

    <script>
        let allData = [];

        async function init() {
            const res = await fetch('data.json');
            allData = await res.json();
            render(allData);
        }

        function sortData(order) {
            document.getElementById('sort-low').classList.toggle('btn-active', order === 'low');
            document.getElementById('sort-high').classList.toggle('btn-active', order === 'high');
            
            const sorted = [...allData].sort((a, b) => {
                const valA = parseFloat(a.rrso.replace('%', '').replace(',', '.'));
                const valB = parseFloat(b.rrso.replace('%', '').replace(',', '.'));
                return order === 'low' ? valA - valB : valB - valA;
            });
            render(sorted);
        }

        function render(data) {
            const container = document.getElementById('ranking-container');
            container.innerHTML = '';
            
            // Grupowanie banków
            const groups = data.reduce((acc, item) => {
                (acc[item.grupa] = acc[item.grupa] || []).push(item);
                return acc;
            }, {});

            Object.keys(groups).forEach(g => {
                const sec = document.createElement('section');
                sec.innerHTML = `<h2 class="text-xl font-bold text-blue-500 mb-6 border-l-4 border-blue-500 pl-4 uppercase">${g}</h2>
                                 <div class="grid grid-cols-1 md:grid-cols-3 gap-4">${groups[g].map(i => `
                                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex items-center justify-between">
                                        <div class="flex items-center gap-3">
                                            <img src="${i.logo}" class="w-8 h-8 object-contain bg-white rounded p-0.5" onerror="this.src='https://placehold.co/32x32'">
                                            <div>
                                                <div class="font-bold text-sm">${i.bank}</div>
                                                <div class="text-xs text-blue-400">RRSO: ${i.rrso}</div>
                                            </div>
                                        </div>
                                        <a href="${i.link}" class="bg-blue-600 px-3 py-1 rounded text-xs hover:bg-blue-500">INFO</a>
                                    </div>`).join('')}</div>`;
                container.appendChild(sec);
            });
        }
        init();
    </script>
</body>
</html>
