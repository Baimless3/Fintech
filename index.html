<!DOCTYPE html>
<html lang="pl">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white">
    <div id="ranking-container" class="grid gap-4 p-10"></div>
    
    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const container = document.getElementById('ranking-container');
                
                container.innerHTML = data.map(item => `
                    <div class="bg-slate-900 p-4 rounded flex items-center gap-4 border border-slate-700">
                        <img src="${item.logo}" class="w-10 h-10 object-contain" onerror="this.src='placeholder.png'">
                        <div>
                            <div class="font-bold">${item.bank}</div>
                            <div class="text-blue-400">RRSO: ${item.rrso || 'Brak danych'}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Nie znaleziono pliku data.json lub błąd składni:", error);
            }
        }
        loadData();
    </script>
</body>
</html>
